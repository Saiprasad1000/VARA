{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARA - Add Offer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#FFFDF8] text-gray-800">
    {% include 'sidebar.html' %}

    <div class="ml-64 min-h-screen">
        <header class="bg-[#FFFDF8] sticky top-0 z-10">
            <div class="flex items-center justify-between px-8 py-4">
                <h1 class="text-xl font-semibold text-[#6B3E26]"></h1>
                <div class="flex-1"></div>
                
            </div>
        </header>

        <main class="flex justify-center items-center min-h-[calc(100vh-80px)]">
            <div class="bg-[#F2EFE9] rounded-2xl shadow-sm p-12 w-full max-w-2xl mx-auto my-8">
                <h2 class="text-2xl font-medium text-center text-gray-800 mb-8">Add Offer</h2>

                {% if messages %}
                <div class="mb-6">
                    {% for message in messages %}
                    <div class="p-4 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="POST" class="space-y-6">
                    {% csrf_token %}

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Offer Name</label>
                            <input type="text" name="name" required placeholder="e.g. Summer Sale 2026"
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Offer Type</label>
                            <select name="offer_type" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm">
                                <option value="Percentage">Percentage Discount (%)</option>
                                <option value="Flat">Flat Discount (₹)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Discount Value</label>
                            <input type="number" step="0.01" name="value" min="0" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Start Date & Time</label>
                            <input type="datetime-local" name="start_date" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">End Date & Time</label>
                            <input type="datetime-local" name="end_date" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Applicable Products (Optional)</label>
                            <select name="products" multiple
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm h-32">
                                {% for p in products %}
                                <option value="{{ p.id }}">{{ p.title }}</option>
                                {% endfor %}
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Hold Ctrl/Cmd to select multiple.</p>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Applicable Categories (Optional)</label>
                            <select name="categories" multiple
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm h-32">
                                {% for c in categories %}
                                <option value="{{ c.id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Hold Ctrl/Cmd to select multiple.</p>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Applicable Variants (Optional)</label>
                            <select name="variants" multiple
                                class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-[#8CC63F] outline-none bg-white shadow-sm h-32">
                                {% for v in variants %}
                                <option value="{{ v.id }}">{{ v.product.title }} - {{ v.variant_type }}</option>
                                {% endfor %}
                            </select>
                            <p class="text-xs text-gray-500 mt-1">Hold Ctrl/Cmd to select multiple.</p>
                        </div>
                        
                        <div class="md:col-span-2 flex items-center mt-2">
                            <input type="checkbox" name="is_active" id="is_active" checked class="w-5 h-5 text-[#8CC63F] focus:ring-[#8CC63F] rounded border-gray-300">
                            <label for="is_active" class="ml-2 block text-sm font-medium text-gray-700">Offer is Active</label>
                        </div>
                    </div>

                    <div class="flex justify-center mt-8">
                        <button type="submit"
                            class="px-12 py-3 bg-[#8CC63F] text-white font-medium rounded-lg hover:bg-[#7bb236] transition shadow-sm w-full md:w-auto">
                            Add Offer
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
