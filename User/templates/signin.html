{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Optional: Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(to right, #f8f9fa, #ffffff);
    }
  </style>
</head>

<body class="flex justify-center items-center min-h-screen">
  <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
    <h2 class="text-3xl font-semibold text-center mb-6">Sign In</h2>
    {% if messages %}
    <div class="space-y-2 mb-4">
      {% for message in messages %}
      <div
        class="p-3 text-white text-sm text-center rounded-xl {% if message.tags == 'error' %} bg-red-500 {% elif message.tags == 'success' %} bg-green-500 {% else %} bg-gray-500 {% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <!-- Email -->
      <input type="email" name="email" placeholder="Enter your email" required
        class="w-full px-4 py-3 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-300" />

      <!-- Password -->
      <div class="relative">
        <input type="password" name="password" id="signin-password" placeholder="Enter your password" required
          class="w-full px-4 py-3 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-300 pr-12" />
        <button type="button" onclick="togglePassword('signin-password', this)"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
          <svg class="w-5 h-5" id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </button>
      </div>

      <script>
        function togglePassword(inputId, button) {
          const input = document.getElementById(inputId);
          const icon = button.querySelector('svg');
          if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
          } else {
            input.type = 'password';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
          }
        }
      </script>

      <!-- Sign In Button -->
      <button type="submit" class="w-full bg-black text-white py-3 rounded-xl mt-4 hover:bg-gray-800 transition">
        Sign in
      </button>
    </form>

    <!-- Forgot Password -->
    <div class="text-center mt-4">
      <a href="{% url 'forgot_password' %}" class="text-orange-600 text-sm hover:underline">Forgot Password?</a>
    </div>

    <!-- Signup Redirect -->
    <p class="text-center text-gray-600 text-sm mt-2">
      Don’t have an account?
      <a href="{% url 'signup' %}" class="text-orange-600 font-medium hover:underline">Sign up</a>
    </p>

    <!-- Google Sign-In -->
    {% comment %} <div class="mt-5 flex justify-center">
      <a href="{% provider_login_url 'google' %}"
        class="flex items-center justify-center bg-white border border-gray-300 rounded-lg px-4 py-2 shadow-sm hover:bg-gray-100">
        <img src="{% static 'images/google-icon.svg' %}" alt="Google" class="w-5 h-5 mr-2" />
        <span>Sign in with Google</span>
      </a>
    </div> {% endcomment %}
  </div>
</body>

</html>
