{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email Change - VARA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    {% include "base/nav.html" %}

    <div class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-sm">
            <div class="text-center">
                <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                    Verify New Email
                </h2>
                <p class="mt-2 text-sm text-gray-600">
                    We've sent a verification code to <strong>{{ new_email }}</strong>
                </p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div
                class="p-4 mb-4 text-sm rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form class="mt-8 space-y-6" action="{% url 'verify_email_change' %}" method="POST">
                {% csrf_token %}
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="otp" class="sr-only">One Time Password</label>
                        <input id="otp" name="otp" type="text" required
                            class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm text-center tracking-widest text-xl"
                            placeholder="Enter 6-digit OTP">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                        Verify Email
                    </button>
                </div>
            </form>

            <div class="text-center">
                <button onclick="resendOtp()" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                    Resend OTP
                </button>
            </div>
        </div>
    </div>

    {% include "base/footer.html" %}

    <script>
        function resendOtp() {
            // Logic to resend OTP via AJAX can be added here
            // For now, we can redirect or show a message
            alert('Resend functionality to be implemented or reuse existing endpoint');
        }
    </script>
</body>

</html>
