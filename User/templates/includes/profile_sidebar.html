<!-- Sidebar -->
<aside class="w-full md:w-64 space-y-4">
    <!-- User Profile Card -->
    <div class="bg-white rounded-lg shadow-sm p-6 text-center">
        <div
            class="w-24 h-24 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-4 overflow-hidden relative group">
            {% if user.pro_image %}
            <img src="{{ user.pro_image.url }}" alt="Profile" class="w-full h-full object-cover">
            {% else %}
            <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            {% endif %}
        </div>
        <h3 class="text-lg font-semibold text-gray-900">
            {{ user.first_name }} {{ user.last_name }}
        </h3>
    </div>

    <!-- Navigation Menu -->
    <nav class="bg-white rounded-lg shadow-sm">
        <a href="{% url 'profile' %}"
            class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-t-lg {% if active_tab == 'overview' %}border-l-4 border-gray-800 bg-gray-50{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span class="font-medium">Account Overview</span>
        </a>

        <a href="{% url 'edit_profile' %}"
            class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 {% if active_tab == 'edit_profile' %}border-l-4 border-gray-800 bg-gray-50{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                </path>
            </svg>
            <span class="font-medium">Edit Profile</span>
        </a>

        <a href="{% url 'my_orders' %}"
            class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 {% if active_tab == 'orders' %}border-l-4 border-gray-800 bg-gray-50{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
            </svg>
            <span class="font-medium">My Orders</span>
        </a>
        <a href="{% url 'manage_addresses' %}"
            class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 {% if active_tab == 'addresses' %}border-l-4 border-gray-800 bg-gray-50{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span class="font-medium">Manage Addresses</span>
        </a>
        <a href="{% url 'wallet' %}"
            class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-50 rounded-b-lg {% if active_tab == 'wallet' %}border-l-4 border-gray-800 bg-gray-50{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
            </svg>
            <span class="font-medium">Wallet</span>
        </a>
    </nav>

    <!-- Logout Button -->
    <button onclick="window.location.href='{% url 'logout' %}'"
        class="w-full bg-gray-800 text-white rounded-full px-6 py-3 font-medium hover:bg-gray-700 transition-colors">
        Logout
    </button>
</aside>
